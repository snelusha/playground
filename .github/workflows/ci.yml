name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            wasm/go.mod

      - name: Build ballerina.wasm
        working-directory: wasm
        env:
          GOOS: js
          GOARCH: wasm
        run: |
          go build -o ../web/public/ballerina.wasm .

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install web dependencies
        working-directory: web
        run: bun install

      - name: Run lint
        working-directory: web
        run: bun run lint

      - name: Build web application
        working-directory: web
        run: bun run build

