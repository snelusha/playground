name: Build and Deploy playground to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go (for WASM)
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: |
            wasm/go.mod

      - name: Build ballerina.wasm
        working-directory: wasm
        env:
          GOOS: js
          GOARCH: wasm
        run: |
          go build -o ../web/public/ballerina.wasm .

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install web dependencies
        working-directory: web
        run: bun install

      - name: Build web application
        working-directory: web
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to GitHub Pages

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

